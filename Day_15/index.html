<!doctype html>
<html>
  <head>
    <title>Css Challenge Day 15</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="frame">
      <div class="theme-switcher">
        <button class="theme-btn" onclick="setTheme('theme-sunset')">
          Sunset
        </button>

        <button class="theme-btn" onclick="setTheme('theme-ocean')">
          Ocean
        </button>

        <button class="theme-btn" onclick="setTheme('theme-dark')">Dark</button>
      </div>
      <div class="center">
        <div class="bar"></div>
        <div class="title">Drop file to upload</div>
        <div class="dropzone">
          <div class="content">
            <img
              src="https://100dayscss.com/codepen/upload.svg"
              class="upload"
            />
            <span class="filename"></span>
            <input type="file" class="input" />
          </div>
        </div>
        <img src="https://100dayscss.com/codepen/syncing.svg" class="syncing" />
        <img src="https://100dayscss.com/codepen/checkmark.svg" class="done" />
        <div class="upload-btn">Upload file</div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
